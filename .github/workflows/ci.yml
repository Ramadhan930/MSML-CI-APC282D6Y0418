name: MLflow CI Advanced

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'

      - name: Install dependencies
        run: pip install mlflow==2.19.0 scikit-learn pandas numpy joblib

      - name: Run training script
        working-directory: MLproject
        run: python modelling.py loan_preprocessing/loan_clean.csv

      - name: Read run ID from file
        id: get_run
        working-directory: MLproject
        run: echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: MLproject
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/credit-model:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credit-model:latest